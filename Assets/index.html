<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Peter Voice TTS</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f5f7fa; }
        h2 { margin-top: 0; }
        textarea { width: 100%; height: 120px; padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; resize: vertical; box-sizing: border-box; }
        button { margin-top: 10px; padding: 12px 24px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { background: #0056b3; }
        button:disabled { background: #aaa; cursor: wait; }
        #status { margin-top: 15px; font-size: 14px; color: #555; min-height: 20px; }
    </style>
</head>
<body>
    <h2>🗣️ Текст → Речь (Браузер)</h2>
    <textarea id="textInput" placeholder="Введите текст для озвучки..."></textarea>
    <br>
    <button id="playBtn">▶️ Озвучить</button>
    <div id="status"></div>

    <script>
        const API_URL = "http://127.0.0.1:8080/tts";
        const btn = document.getElementById("playBtn");
        const status = document.getElementById("status");
        const input = document.getElementById("textInput");

        btn.onclick = async () => {
            const text = input.value.trim();
            if (!text) return alert("Введите текст!");

            btn.disabled = true;
            status.textContent = "⏳ Генерация аудио...";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });

                if (!res.ok) throw new Error(`Сервер вернул ошибку: ${res.status}`);

                // Получаем аудио как Blob
                const blob = await res.blob();
                const audioUrl = URL.createObjectURL(blob);
                const audio = new Audio(audioUrl);

                audio.onplay = () => status.textContent = "🔊 Воспроизведение...";
                audio.onended = () => {
                    status.textContent = "✅ Готово";
                    URL.revokeObjectURL(audioUrl); // Освобождаем память
                    btn.disabled = false;
                };
                audio.onerror = () => {
                    status.textContent = "❌ Ошибка воспроизведения в браузере";
                    btn.disabled = false;
                };

                await audio.play();
            } catch (err) {
                status.textContent = `❌ ${err.message}`;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
